services:
  # -------------------- Splunk --------------------
  splunk:
    image: splunk/splunk:9.4.13              # ← pinned to last good build
    container_name: security-range-splunk
    hostname: security-range-splunk
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_PASSWORD: Password1             # change after first login
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN}  # pre-creates token
      SPLUNK_HEC_ENABLE: "true"
      SPLUNK_HEC_SSL: "false"
      SPLUNK_APPS_URL: /tmp/apps/ta-llmgateway_036.tgz
    ports:
      - "8000:8000"
      - "8088:8088"
      - "8089:8089"                          # management port (REST API)
      - "514:514/udp"                        # syslog UDP port
    volumes:
      - splunk_var:/opt/splunk/var
      - splunk_etc:/opt/splunk/etc
      # TA apps — bind-mount into apps directory so Splunk loads them on start
      - ./apps/TA-ollama-releasev1:/opt/splunk/etc/apps/TA-ollama-releasev1
      - ./apps/TA-mcp-jsonrpc:/opt/splunk/etc/apps/TA-mcp-jsonrpc
      # TA-llmgateway installed via SPLUNK_APPS_URL on first start
      - ./ta-llmgateway_036.tgz:/tmp/apps/ta-llmgateway_036.tgz
      # Shared log directory — read-only, TAs monitor these files
      - ./logs:/var/log/docker-apps:ro
      # Bifrost data dir — read-only, available for TA modular input if enabled
      - ./bifrost:/mnt/bifrost:ro

  # -------------------- Ollama --------------------
  ollama:
    image: ollama/ollama:0.3.12
    container_name: security-range-ollama
    hostname: ollama-server
    environment:
      OLLAMA_DEBUG: "1"
      OLLAMA_VERBOSE: "1"
      OLLAMA_ORIGINS: "*"
      RUST_LOG: "debug,ollama=trace"
      RUST_BACKTRACE: "full"
      OLLAMA_LOGS: "1"
      GIN_MODE: debug
      OLLAMA_LOG_LEVEL: DEBUG
      OLLAMA_LOG_PROMPT: "1"
      OLLAMA_LOG_REQUESTS: "1"
      OLLAMA_LOG_RESPONSES: "1"
      OLLAMA_ENABLE_LOGGING: "1"
    ports: ["11434:11434"]
    volumes:
      - ollama_models:/root/.ollama
      - ./logs:/var/log/ollama
      # startup script writes logs to /var/log/ollama/ollama.log → ./logs/ollama.log
      - ./ollama_startup.sh:/usr/local/bin/startup.sh:ro
    entrypoint: ["/bin/sh"]
    command: ["/usr/local/bin/startup.sh"]

  # -------------------- MCP  ------------------
  ollama-mcp:
    image: node:20-slim
    container_name: security-range-ollama-mcp
    depends_on: [ollama]
    environment:
      PORT: 3456
      OLLAMA_API: http://security-range-ollama:11434
      LOG_LEVEL: DEBUG
      DEBUG: "*"
      NODE_ENV: development
      VERBOSE: "1"
      NODE_DEBUG: "*"
      NPM_CONFIG_LOGLEVEL: verbose
    # stdout (JSON-RPC) → mcp.log, stderr (debug) → mcp.stderr
    # TA-mcp monitors mcp.log with sourcetype=mcp:jsonrpc
    command: ["/bin/bash", "-c", "mkdir -p /var/log && exec npx -y @rawveg/ollama-mcp > /var/log/mcp.log 2>/var/log/mcp.stderr"]
    volumes:
      - ./logs:/var/log
    ports: ["3456:3456"]

  # -------------------- Bifrost LLM Gateway --------------------
  bifrost:
    image: maximhq/bifrost:latest
    container_name: security-range-bifrost
    hostname: bifrost-gateway
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ./bifrost:/app/data
    ports: ["8090:8080"]
    restart: unless-stopped

  # -------------------- LiteLLM Gateway --------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: security-range-litellm
    hostname: litellm-gateway
    depends_on:
      ollama:
        condition: service_started
    environment:
      LITELLM_MASTER_KEY: sk-litellm-local
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ./litellm/custom_callbacks.py:/app/custom_callbacks.py:ro
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    working_dir: /app
    ports: ["4001:4000"]
    restart: unless-stopped

  # ---- Bifrost keepalive — keeps UI 1h window populated ----
  bifrost-keepalive:
    image: python:3.12-alpine
    container_name: security-range-bifrost-keepalive
    depends_on:
      bifrost:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      BIFROST_URL: http://security-range-bifrost:8080/v1/chat/completions
      KEEPALIVE_INTERVAL: "1200"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./bifrost/keepalive.py:/app/keepalive.py:ro
    command: ["python3", "/app/keepalive.py"]
    restart: unless-stopped

  # ---- Bifrost -> Splunk HEC sidecar ----
  bifrost-hec-shipper:
    image: python:3.12-alpine
    container_name: security-range-bifrost-shipper
    depends_on:
      bifrost:
        condition: service_started
    environment:
      SPLUNK_HEC_URL: http://security-range-splunk:8088/services/collector/event
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN}
      BIFROST_DB_PATH: /app/data/logs.db
      SHIP_INTERVAL: "30"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./bifrost:/app/data:ro
      - ./bifrost/hec_shipper.py:/app/hec_shipper.py:ro
    command: ["python3", "/app/hec_shipper.py"]
    restart: unless-stopped

  # -------------------- Promptfoo -----------------
  promptfoo:
    image: ghcr.io/promptfoo/promptfoo:latest
    container_name: security-range-promptfoo
    ports: ["3000:3000"]
    volumes:
      - promptfoo_data:/home/promptfoo/.promptfoo
    depends_on: [ollama]

  # -------------------- OpenWebUI -----------------
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: security-range-openwebui
    environment:
      OLLAMA_BASE_URL: http://security-range-ollama:11434
      WEBUI_SECRET_KEY: your-secret-key   # ollama usually does NOT require authentication when running it locally
      LOG_LEVEL: DEBUG
      ENABLE_SIGNUP: false
      WEBUI_AUTH: false
    ports: ["3001:8080"]
    volumes:
      - openwebui_data:/app/backend/data
    depends_on: [ollama]
    restart: unless-stopped


# ---------- Named volumes ----------
volumes:
  ollama_models:
  splunk_var:
  splunk_etc:
  promptfoo_data:
  openwebui_data:
